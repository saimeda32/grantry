name: Bug report
description: Something in grantry did not work the way you expected.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please do not paste any real
        credentials, tokens, account IDs, or start URLs. Use placeholders.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did you do, and what went wrong?
      placeholder: I ran `grantry run ...` and got ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected
      placeholder: I expected grantry to ...
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The exact commands, with secrets redacted.
      render: shell
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: grantry version
      description: Output of `grantry version`.
      placeholder: grantry 0.4.0
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12.3"
    validations:
      required: false
